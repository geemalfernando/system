<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Vehicle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">Lion Car Sale</a>
        <div class="d-flex gap-2">
          <a class="btn btn-light" href="/vehicles">Vehicles</a>
          <a class="btn btn-light" href="/vehicles/sold">Sold</a>
          <a class="btn btn-light" href="/sales">Sales</a>
          <a class="btn btn-light" href="/tax">Tax</a>
          <a class="btn btn-light" href="/reports/taxes">Reports</a>
        </div>
      </div>
    </nav>
    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <div class="text-muted">Form</div>
          <h3 class="app-page-title mb-0">Add Vehicle</h3>
          <div class="text-muted small">New vehicles start in Shipping. Move to Inventory from the vehicle page when it arrives.</div>
        </div>
        <a href="/vehicles" class="btn btn-outline-primary">Back</a>
      </div>
      <form method="post">
        <div class="row">
          <div class="col-md-4 mb-3"><label class="form-label">File Number</label><input name="file_number" class="form-control" required></div>
          <div class="col-md-4 mb-3"><label class="form-label">Make</label><input name="make" class="form-control" list="make-suggestions"></div>
          <div class="col-md-4 mb-3"><label class="form-label">Model</label><input name="model" class="form-control"></div>
        </div>
        <div class="row">
          <div class="col-md-4 mb-3"><label class="form-label">Model Code</label><input name="model_code" class="form-control"></div>
          <div class="col-md-4 mb-3"><label class="form-label">Chassis No</label><input name="chassis_no" class="form-control"></div>
          <div class="col-md-4 mb-3"><label class="form-label">LC No</label><input name="lc_no" class="form-control"></div>
        </div>
        <div class="row">
          <div class="col-md-4 mb-3"><label class="form-label">LC Value</label><input name="lc_value" class="form-control" type="number" step="0.01"></div>
        </div>
        <div class="row">
          <div class="col-md-2 mb-3"><label class="form-label">Year</label><input name="year" class="form-control"></div>
          <div class="col-md-2 mb-3"><label class="form-label">Color</label><input name="color" class="form-control"></div>
        </div>
        <button class="btn btn-primary">Create</button>
      </form>
      <datalist id="make-suggestions">
        {% for make in make_suggestions or [] %}
          <option value="{{ make }}"></option>
        {% endfor %}
      </datalist>
    </div>
    {% include "_footer.html" %}
  </body>
</html>
